<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement — L'Atelier du Detail</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/theme.js"></script>
</head>
<body>

    <div id="header-container"></div>

    <div class="page-titre fade-in">
        <h1>Finaliser la commande</h1>
        <p>Renseignez vos coordonnees pour valider votre commande</p>
    </div>

    <section class="caisse-section" id="caisse-section">

        <div class="caisse-grille">

            <!-- Colonne gauche : coordonnees + paiement -->
            <div class="caisse-colonne">

                <div class="caisse-card">
                    <h2 class="caisse-titre">Vos coordonnees</h2>
                    <form id="form-caisse" novalidate>

                        <div class="caisse-ligne-double">
                            <div class="caisse-champ">
                                <label for="caisse-prenom">Prenom</label>
                                <input type="text" id="caisse-prenom" class="caisse-input" placeholder="Sophie" autocomplete="given-name" required>
                            </div>
                            <div class="caisse-champ">
                                <label for="caisse-nom">Nom</label>
                                <input type="text" id="caisse-nom" class="caisse-input" placeholder="Martin" autocomplete="family-name" required>
                            </div>
                        </div>

                        <div class="caisse-champ">
                            <label for="caisse-email">Email</label>
                            <input type="email" id="caisse-email" class="caisse-input" placeholder="sophie@exemple.fr" autocomplete="email" required>
                        </div>

                        <div class="caisse-champ">
                            <label for="caisse-adresse">Adresse</label>
                            <input type="text" id="caisse-adresse" class="caisse-input" placeholder="12 rue des Fleurs" autocomplete="street-address" required>
                        </div>

                        <div class="caisse-ligne-double">
                            <div class="caisse-champ">
                                <label for="caisse-code-postal">Code postal</label>
                                <input type="text" id="caisse-code-postal" class="caisse-input" placeholder="75001" autocomplete="postal-code" required maxlength="5">
                            </div>
                            <div class="caisse-champ">
                                <label for="caisse-ville">Ville</label>
                                <input type="text" id="caisse-ville" class="caisse-input" placeholder="Paris" autocomplete="address-level2" required>
                            </div>
                        </div>

                        <!-- Faux formulaire carte bancaire -->
                        <div class="caisse-card caisse-card--paiement" id="stripe-zone">
                            <h2 class="caisse-titre">Informations de paiement</h2>

                            <div class="caisse-champ">
                                <label for="carte-numero">Numero de carte</label>
                                <input type="text" id="carte-numero" class="caisse-input" placeholder="1234 5678 9012 3456" maxlength="19" autocomplete="cc-number" required>
                            </div>

                            <div class="caisse-ligne-double">
                                <div class="caisse-champ">
                                    <label for="carte-expiration">Date d'expiration</label>
                                    <input type="text" id="carte-expiration" class="caisse-input" placeholder="MM/AA" maxlength="5" autocomplete="cc-exp" required>
                                </div>
                                <div class="caisse-champ">
                                    <label for="carte-cvc">CVC</label>
                                    <input type="text" id="carte-cvc" class="caisse-input" placeholder="123" maxlength="3" autocomplete="cc-csc" required>
                                </div>
                            </div>
                        </div>

                        <div class="caisse-erreur" id="caisse-erreur" style="display:none"></div>

                        <button type="submit" class="btn-payer" id="btn-payer">
                            Payer <span id="btn-payer-montant">...</span>
                        </button>

                        <p class="caisse-securite">
                            Paiement simule — aucune donnee bancaire reelle n'est traitee.
                        </p>

                    </form>
                </div>

            </div>

            <!-- Colonne droite : recapitulatif -->
            <div class="caisse-colonne">
                <div class="caisse-card caisse-card--recap" id="caisse-recap">
                    <h2 class="caisse-titre">Votre commande</h2>
                    <div id="recap-articles"></div>
                    <div class="caisse-recap-lignes" id="recap-lignes"></div>
                    <a href="panier.html" class="caisse-modifier">Modifier le panier</a>
                </div>
            </div>

        </div>

    </section>

    <div id="footer-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/produits.js"></script>
    <script src="js/panier.js"></script>
    <script src="js/favoris.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/scroll.js"></script>
    <script src="js/cookie.js"></script>
    <script src="js/caisse.js"></script>

</body>
</html>
